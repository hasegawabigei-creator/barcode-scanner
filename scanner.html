<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>バーコードスキャン</title>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; flex-direction:column; height:100vh; font-family:-apple-system,sans-serif; overflow:hidden; }
#header { background:#111; color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
#header h1 { font-size:16px; font-weight:500; }
#close-btn { background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:50%; width:36px; height:36px; font-size:20px; cursor:pointer; }
#viewfinder { position:relative; flex:1; overflow:hidden; }
#viewfinder video { width:100%; height:100%; object-fit:cover; display:block; }
#viewfinder canvas { position:absolute; top:0; left:0; }
#overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:10; }
#guide { width:80%; height:28%; border:2px solid #FFD600; border-radius:6px; box-shadow:0 0 0 2000px rgba(0,0,0,.5); position:relative; }
#guide-text { position:absolute; top:-28px; left:0; right:0; text-align:center; color:#FFD600; font-size:12px; font-weight:500; white-space:nowrap; }
#status { background:#111; color:#aaa; text-align:center; padding:14px 16px; font-size:13px; flex-shrink:0; line-height:1.6; }
#result-bar { display:none; background:#1a7a1a; color:#fff; text-align:center; padding:16px; font-size:14px; flex-shrink:0; }
</style>
</head>
<body>
<div id="header">
  <h1>バーコードスキャン</h1>
  <button id="close-btn" onclick="closeScanner()">×</button>
</div>
<div id="viewfinder">
  <div id="overlay">
    <div id="guide">
      <div id="guide-text">この枠内にバーコードを入れてください</div>
    </div>
  </div>
</div>
<div id="status">カメラを起動中...</div>
<div id="result-bar"></div>

<script>
var statusEl = document.getElementById('status');
var resultEl = document.getElementById('result-bar');

function closeScanner() {
  try { Quagga.stop(); } catch(e) {}
  window.close();
}

function onResult(text) {
  var cleaned = text;
  var first = text.charAt(0).toUpperCase();
  var last  = text.charAt(text.length - 1).toUpperCase();
  if ((first === 'A' || first === 'B' || first === 'C' || first === 'D') &&
      (last  === 'A' || last  === 'B' || last  === 'C' || last  === 'D') &&
      text.length > 3) {
    cleaned = text.slice(1, text.length - 2);
  }

  try { Quagga.stop(); } catch(e) {}
  resultEl.textContent = '✓ 読み取り完了: ' + cleaned;
  resultEl.style.display = 'block';
  statusEl.textContent = 'ウィンドウが自動で閉じます...';
  if (window.opener) {
    window.opener.postMessage({ type: 'BARCODE_RESULT', value: cleaned }, '*');
  }
  setTimeout(function() { closeScanner(); }, 1500);
}

window.addEventListener('load', function() {
  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.getElementById('viewfinder'),
      constraints: {
        facingMode: 'environment',
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      },
      area: {
        top:    '36%',
        right:  '10%',
        bottom: '36%',
        left:   '10%'
      }
    },
    decoder: {
      readers: [
        'codabar_reader',
        'code_128_reader',
        'code_39_reader',
        'code_93_reader',
        'ean_reader',
        'ean_8_reader',
        'upc_reader',
        'upc_e_reader',
        'i2of5_reader'
      ],
      multiple: false
    },
    locate: true,
    numOfWorkers: 2,
    frequency: 10
  }, function(err) {
    if (err) {
      statusEl.innerHTML = 'カメラエラー: ' + err + '<br>ブラウザの設定でカメラを許可してください';
      return;
    }
    Quagga.start();
    statusEl.textContent = '枠内にバーコードを入れてください（自動読み取り）';
  });

  var results = {};
  Quagga.onDetected(function(data) {
    var code = data.codeResult.code;
    results[code] = (results[code] || 0) + 1;
    if (results[code] >= 3) {
      onResult(code);
    }
  });
});
</script>
</body>
</html>
